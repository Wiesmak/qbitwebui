{{- if .Values.env }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "qbitwebui.fullname" . }}
  labels:
    {{- include "qbitwebui.labels" . | nindent 4 }}
data:
  {{- range .Values.env }}
  {{- range $key, $value := . }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
{{- end }}